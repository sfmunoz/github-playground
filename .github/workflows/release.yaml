name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: actions/checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: actions/setup-go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: build.sh
        run: bash scripts/build.sh
        env:
          RELEASE: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
